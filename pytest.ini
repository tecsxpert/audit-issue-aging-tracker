[pytest]
testpaths = tests
pythonpath =
    .
    tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short --disable-warnings --cov=. --cov-branch --cov-report=term-missing
markers =
    unit: Unit tests for individual functions
    integration: Integration tests with mocked external services
    security: Security and injection tests
    slow: Tests that take longer to run
minversion = 6.0
